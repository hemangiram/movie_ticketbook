{% extends 'base.html' %}

{% block content %}

<h3 class="mb-4">Available Movies</h3>

<div class="row">
    {% for movie in movies %}
    <div class="col-md-4 mb-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title">{{ movie.title }}</h5>
                <p class="card-text">Price: ₹{{ movie.price }}</p>
                <p class="card-text">Available: {{ movie.available_seats }}</p>
                <a href="{% url 'movie_detail' movie.id %}" class="btn btn-primary">View Details</a>
            </div>
        </div>
    </div>
    {% empty %}
        <p>No movies available.</p>
    {% endfor %}
</div>

{% endblock %}
